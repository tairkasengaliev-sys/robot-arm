<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Robot Hand Control Interface - 5 finger robotic hand with computer vision">
    <meta name="theme-color" content="#1a1a2e">
    <title>🖐️ Robot Hand Control</title>
    
    <!-- Performance: Preconnect to CDN -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <style>
        /* ====================================================================
           CSS Variables for Maintainability
           ==================================================================== */
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --accent-green: #00ff88;
            --accent-red: #e94560;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-radius: 15px;
            --transition: all 0.15s ease;
        }
        
        /* ====================================================================
           Reset & Base
           ==================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        /* ====================================================================
           Layout
           ==================================================================== */
        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        
        /* ====================================================================
           Video Section
           ==================================================================== */
        .video-section {
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            min-height: 480px;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .status-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
        }
        
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected { background: var(--accent-green); }
        .status-dot.disconnected { background: var(--accent-red); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* ====================================================================
           Control Panel
           ==================================================================== */
        .control-section {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 20px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: var(--transition);
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-connect { background: var(--accent-red); color: #fff; }
        .btn-connect.connected { background: var(--accent-green); color: #000; }
        .btn-action { background: var(--bg-tertiary); color: #fff; }
        
        /* ====================================================================
           Sliders
           ==================================================================== */
        .slider-item {
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .slider-value {
            color: var(--accent-green);
            font-weight: bold;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: var(--bg-tertiary);
            border-radius: 4px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-green);
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* ====================================================================
           Log Panel
           ==================================================================== */
        .log {
            background: #0a0a15;
            border-radius: 10px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-entry { margin: 3px 0; color: var(--text-secondary); }
        .log-entry.new { color: var(--accent-green); }
        
        /* ====================================================================
           Utility
           ==================================================================== */
        .no-hand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-secondary);
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🖐️ Robot Hand - 5 Fingers</h1>
    
    <div class="container">
        <!-- Video Section -->
        <div class="video-section">
            <video id="video" autoplay playsinline muted></video>
            <div class="status-overlay">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
            <div class="no-hand" id="noHandMsg">👋 Show your hand</div>
        </div>
        
        <!-- Control Panel -->
        <div class="control-section">
            <button class="btn btn-connect" id="btnConnect">📡 Connect</button>
            <button class="btn btn-action" onclick="app.sendCommand('OPEN')">🖐 Open</button>
            <button class="btn btn-action" onclick="app.sendCommand('GRIP')">✊ Grip</button>
            <button class="btn btn-action" onclick="app.sendCommand('HOME')">🏠 Home</button>
            
            <div class="sliders" id="sliders"></div>
            <div class="log" id="log"></div>
        </div>
    </div>
    
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- Application Code -->
    <script>
    /**
     * ============================================================================
     * Robot Hand Control Application
     * ============================================================================
     * Architecture: Module Pattern with Class-based Structure
     * Features: WebSocket Relay, MediaPipe Hand Tracking, Real-time Control
     * ============================================================================
     */
    
    class RobotHandApp {
        /**
         * Configuration
         */
        config = {
            relayUrl: "wss://robot-arm-relay-production.up.railway.app",
            numFingers: 5,
            defaultAngle: 90,
            throttleMs: 100
        };
        
        /**
         * State
         */
        state = {
            ws: null,
            wsReady: false,
            positions: Array(5).fill(90),
            lastAngles: null,
            fingers: ['👍 Thumb', '☝️ Index', '🖕 Middle', '💍 Ring', '🤙 Pinky']
        };
        
        /**
         * Initialize Application
         */
        constructor() {
            this.initUI();
            this.initRelay();
            this.initCamera();
            this.log('Application started');
        }
        
        /**
         * UI Initialization
         */
        initUI() {
            const slidersDiv = document.getElementById('sliders');
            
            this.state.fingers.forEach((finger, i) => {
                const item = document.createElement('div');
                item.className = 'slider-item';
                item.innerHTML = `
                    <div class="slider-label">
                        <span>${finger}</span>
                        <span class="slider-value" id="val-${i}">${this.config.defaultAngle}°</span>
                    </div>
                    <input type="range" min="0" max="180" value="${this.config.defaultAngle}" 
                           id="sl-${i}" oninput="app.updatePosition(${i}, this.value)">
                `;
                slidersDiv.appendChild(item);
            });
            
            // Connect button
            document.getElementById('btnConnect').onclick = () => this.toggleConnection();
        }
        
        /**
         * Relay WebSocket Connection
         */
        initRelay() {
            this.connectRelay();
        }
        
        connectRelay() {
            this.state.ws = new WebSocket(this.config.relayUrl);
            
            this.state.ws.onopen = () => {
                this.state.ws.send(JSON.stringify({ type: 'register', role: 'web' }));
                this.state.wsReady = true;
                this.updateConnectionStatus(true);
                this.log('✅ Relay connected');
            };
            
            this.state.ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'arduino_status') {
                    this.updateConnectionStatus(data.connected);
                }
            };
            
            this.state.ws.onclose = () => {
                this.state.wsReady = false;
                this.updateConnectionStatus(false);
                this.log('🔄 Reconnecting...');
                setTimeout(() => this.connectRelay(), 3000);
            };
            
            this.state.ws.onerror = () => this.log('⚠️ Relay error');
        }
        
        toggleConnection() {
            if (this.state.wsReady) {
                this.state.ws.close();
            } else {
                this.connectRelay();
            }
        }
        
        updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('btnConnect');
            
            dot.className = `status-dot ${connected ? 'connected' : 'disconnected'}`;
            text.textContent = connected ? 'Laptop Online ✅' : 'Offline ❌';
            btn.classList.toggle('connected', connected);
            
            this.log(connected ? '🤖 Arduino connected!' : '❌ Arduino disconnected');
        }
        
        /**
         * Command Sending
         */
        sendCommand(cmd) {
            if (!this.state.wsReady) {
                this.log('⚠️ No relay connection');
                return;
            }
            
            this.state.ws.send(JSON.stringify({ type: 'command', command: cmd }));
            this.log(`→ ${cmd}`);
        }
        
        sendPositions(positions) {
            if (!this.state.wsReady) return;
            this.state.ws.send(JSON.stringify({ type: 'set', positions }));
        }
        
        updatePosition(index, value) {
            this.state.positions[index] = parseInt(value);
            document.getElementById(`val-${index}`).textContent = `${value}°`;
            this.throttledSend();
        }
        
        throttleTimer = null;
        throttledSend() {
            clearTimeout(this.throttleTimer);
            this.throttleTimer = setTimeout(() => {
                this.sendPositions(this.state.positions);
            }, this.config.throttleMs);
        }
        
        /**
         * MediaPipe Camera
         */
        initCamera() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults((results) => this.onHandResults(results));
            
            // Start camera
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
            }).then((stream) => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                this.log('✓ Camera started');
                
                const process = async () => {
                    if (video.readyState >= 2) {
                        await hands.send({ image: video });
                    }
                    requestAnimationFrame(process);
                };
                process();
            }).catch((err) => {
                this.log(`✗ Camera: ${err.message}`);
                document.getElementById('noHandMsg').textContent = '📵 No camera access';
            });
        }
        
        onHandResults(results) {
            const noHandMsg = document.getElementById('noHandMsg');
            
            if (results.multiHandLandmarks?.length > 0) {
                noHandMsg.style.display = 'none';
                const landmarks = results.multiHandLandmarks[0];
                const angles = this.calculateAngles(landmarks);
                
                // Update UI and send
                angles.forEach((angle, i) => {
                    if (i < 5) {
                        document.getElementById(`sl-${i}`).value = angle;
                        this.state.positions[i] = angle;
                        document.getElementById(`val-${i}`).textContent = `${angle}°`;
                    }
                });
                
                // Send if changed
                const anglesStr = JSON.stringify(angles);
                if (anglesStr !== JSON.stringify(this.state.lastAngles)) {
                    this.sendPositions(angles);
                    this.state.lastAngles = angles;
                }
            } else {
                noHandMsg.style.display = 'block';
            }
        }
        
        calculateAngles(landmarks) {
            const dist = (a, b) => Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
            const base = 40;
            const maxOpen = 0.12;
            
            return [
                Math.round(45 + Math.min(dist(landmarks[4], landmarks[0]) / 0.15, 1) * 90),
                Math.round(base + Math.min(dist(landmarks[8], landmarks[6]) / maxOpen, 1) * (180 - base)),
                Math.round(base + Math.min(dist(landmarks[12], landmarks[10]) / maxOpen, 1) * (180 - base)),
                Math.round(base + Math.min(dist(landmarks[16], landmarks[14]) / maxOpen, 1) * (180 - base)),
                Math.round(base + Math.min(dist(landmarks[20], landmarks[18]) / maxOpen, 1) * (180 - base))
            ];
        }
        
        /**
         * Logging
         */
        log(msg, isNew = true) {
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isNew ? ' new' : '');
            const time = new Date().toLocaleTimeString('ru-RU');
            entry.textContent = `[${time}] ${msg}`;
            const log = document.getElementById('log');
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
    }
    
    // Start Application
    const app = new RobotHandApp();
    </script>
</body>
</html>
